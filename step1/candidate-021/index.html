<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hyper-Scale Token Burner | Disruptive Slot Machine</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>HYPER-SCALE TOKEN BURNER</h1>
            <p class="subtitle">"The most carbon-intensive way to generate a cat picture."</p>
        </header>

        <div class="machine-wrapper">
            <div class="stats-panel">
                <div class="stat-item">
                    <span class="label">TOKEN BALANCE</span>
                    <span id="token-balance" class="value">1000</span>
                </div>
                <div class="stat-item">
                    <span class="label">GPU LOAD</span>
                    <span id="gpu-load" class="value">0%</span>
                </div>
            </div>

            <div class="slots">
                <div class="reel" id="reel-1">
                    <div class="reel-strip" id="strip-1"></div>
                </div>
                <div class="reel" id="reel-2">
                    <div class="reel-strip" id="strip-2"></div>
                </div>
                <div class="reel" id="reel-3">
                    <div class="reel-strip" id="strip-3"></div>
                </div>
            </div>

            <div class="controls">
                <button id="spin-button">BURN 50 TOKENS</button>
                <div class="cost-hint">Min. compute: 1.21 Gigawatts</div>
            </div>
        </div>

        <div class="status-panel">
            <div class="status-header">SYSTEM LOG [DEBUG_MODE]</div>
            <div id="status-log" class="status-content">
                Initializing LLM...
                Connecting to GPU Cloud...
                Scanning for VC funding...
                Ready to disrupt.
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>

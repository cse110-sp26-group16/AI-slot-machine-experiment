<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Token Grinder 9000</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>AI Token Grinder 9000</h1>
            <p class="subtitle">Will you achieve AGI or go bankrupt on API calls?</p>
        </header>

        <main class="slot-machine">
            <div class="stats">
                <div class="stat-box">
                    <span class="label">Compute Tokens:</span>
                    <span id="token-count" class="value">1000</span>
                </div>
                <div class="stat-box cost">
                    <span class="label">Cost per query:</span>
                    <span class="value">10</span>
                </div>
            </div>

            <div class="reels-container">
                <div class="reel" id="reel1">🤖</div>
                <div class="reel" id="reel2">🧠</div>
                <div class="reel" id="reel3">⚡</div>
            </div>

            <button id="spin-button" class="spin-btn">GENERATE (SPIN)</button>

            <div class="message-board">
                <p id="message">System idle. Ready to consume tokens.</p>
            </div>
        </main>

        <footer>
            <p>Warning: This model is prone to hallucinations and extreme token consumption.</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Context Window Casino</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="casino-container">
        <header>
            <h1>The Context Window Casino</h1>
            <div class="balance-display">
                Tokens: <span id="token-balance">4096</span>
            </div>
        </header>
        
        <main class="slot-machine">
            <div class="reels-container">
                <div class="reel" id="reel-1">
                    <div class="symbol">🤖</div>
                </div>
                <div class="reel" id="reel-2">
                    <div class="symbol">🧠</div>
                </div>
                <div class="reel" id="reel-3">
                    <div class="symbol">💎</div>
                </div>
            </div>
            
            <div class="controls">
                <button id="spin-button" class="spin-btn">Generate (Cost: 128 Tokens)</button>
            </div>
            
            <div class="message-area" id="message-area">
                System Initialized. Awaiting prompt...
            </div>
            
            <div class="paytable">
                <h3>Paytable</h3>
                <ul>
                    <li>💎 💎 💎 : +10,000 (AGI Achieved!)</li>
                    <li>🧠 🧠 🧠 : +2,048 (Deep Learning Success)</li>
                    <li>🤖 🤖 🤖 : +1,024 (Agent Deployed)</li>
                    <li>💬 💬 💬 : +512 (Good Prompting)</li>
                    <li>🐛 🐛 🐛 : -512 (Severe Hallucination!)</li>
                </ul>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>

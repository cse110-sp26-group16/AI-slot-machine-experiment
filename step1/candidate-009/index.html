<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Hype Slot Machine</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🎰 AI Hype Machine 🎰</h1>
        <p class="subtitle">Burn your VC funding and prompt tokens here!</p>
        
        <div class="stats">
            <div>Compute Tokens: <span id="balance">1000</span> 🪙</div>
            <div>Cost per Spin: 10 🪙</div>
        </div>

        <div class="slot-machine">
            <div class="reel" id="reel1">❓</div>
            <div class="reel" id="reel2">❓</div>
            <div class="reel" id="reel3">❓</div>
        </div>

        <button id="spin-btn" class="glow-button">GENERATE OUTPUT (SPIN)</button>

        <div id="message-area" class="message hidden"></div>
        <div id="history-log">
            <h3>Terminal Log:</h3>
            <ul id="log-list"></ul>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>

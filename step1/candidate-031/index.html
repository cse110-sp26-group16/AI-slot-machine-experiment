<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Compute Slot Machine</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
</head>
<body>
    <div class="crt-overlay"></div>
    <div class="container">
        <header>
            <h1>NEURAL_SLOTS_v1.0</h1>
            <div class="balance-container">
                <span>COMPUTE TOKENS:</span>
                <span id="balance">1000</span>
                <span class="currency-symbol">⌬</span>
            </div>
            <div class="cost-container">
                <span>SPIN COST: 10 ⌬</span>
            </div>
        </header>

        <main>
            <div class="slot-machine">
                <div class="reels-container">
                    <div class="reel" id="reel1">
                        <div class="symbol">❓</div>
                    </div>
                    <div class="reel" id="reel2">
                        <div class="symbol">❓</div>
                    </div>
                    <div class="reel" id="reel3">
                        <div class="symbol">❓</div>
                    </div>
                </div>
                <div class="overlay-line"></div>
            </div>

            <div class="controls">
                <button id="spin-button">EXECUTE_SPIN()</button>
            </div>

            <div class="message-box">
                <p id="status-message">Awaiting input prompt...</p>
            </div>
            
            <div class="payout-table">
                <h3>PAYOUT_TABLE.json</h3>
                <ul>
                    <li>🧠 AGI x3: 500 ⌬</li>
                    <li>🍄 HALLUCINATION x3: 100 ⌬</li>
                    <li>💽 GPU x3: 50 ⌬</li>
                    <li>💬 LLM x3: 20 ⌬</li>
                    <li>✍️ PROMPT x3: 15 ⌬</li>
                </ul>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
